name: Web CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'

jobs:
  # ── Lint + build check (every push / PR) ─────────────────────────────────
  # Vercel deploys automatically via its GitHub integration — no deploy step
  # needed here. This job just validates the build won't break on Vercel.
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: https://staging.api.b3hub.lv/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=apps/web

      - name: Build
        run: npm run build --workspace=apps/web
